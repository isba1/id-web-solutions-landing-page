<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy — ID Web Solutions Growth Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header img { height: 48px; width: auto; }
    header h1 { font-size: 1.25rem; font-weight: 600; }

    main {
      flex: 1;
      max-width: 760px;
      margin: 60px auto;
      padding: 0 24px;
    }

    h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }

    .updated {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 36px;
    }

    /* ── PASTE YOUR PRIVACY POLICY HTML INSIDE .policy-body ── */
    .policy-body {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 32px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #333;
    }

    .placeholder-notice {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fffbea;
      border: 1px dashed #f0b429;
      border-radius: 8px;
      padding: 20px 24px;
      color: #7c5e00;
      font-size: 0.9rem;
    }

    footer {
      background: #fff;
      border-top: 1px solid #e5e5e5;
      padding: 20px 40px;
      display: flex;
      gap: 24px;
      font-size: 0.875rem;
    }

    footer a { color: #1a56db; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    footer .copyright { margin-left: auto; color: #888; }
  </style>
</head>
<body>

  <header>
    <img src="ID_Web_Solutions_Logo.png" alt="ID Web Solutions logo" />
    <h1>ID Web Solutions</h1>
  </header>

  <main>
    <h2>Privacy Policy</h2>
    <p class="updated">Last updated: April 2026</p>

    <div class="policy-body">

      <!--
        ============================================================
        PASTE YOUR PRIVACY POLICY HTML HERE.
        Replace the placeholder notice below with your actual content.
        ============================================================
      -->

      <div class="placeholder-notice">
        &#9888; Privacy Policy content coming soon. Replace this block with your
        privacy policy HTML before publishing.
      </div>

    </div>
  </main>

  <footer>
    <a href="index.html">&larr; Back</a>
    <a href="terms.html">Terms of Service</a>
    <span class="copyright">&copy; 2026 ID Web Solutions. All rights reserved.</span>
  </footer>

</body>
</html>
